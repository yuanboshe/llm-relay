name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Existing release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release version
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${version}" =~ ^v[0-9]+[.][0-9]+[.][0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release version must look like v0.1.0 or v0.1.0-rc.1: ${version}" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.release.outputs.version }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Compute build metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          echo "commit=$(git rev-parse --short HEAD)" >> "${GITHUB_OUTPUT}"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build release assets
        run: |
          make build \
            VERSION="${{ steps.release.outputs.version }}" \
            COMMIT="${{ steps.metadata.outputs.commit }}" \
            BUILD_DATE="${{ steps.metadata.outputs.date }}"

      - name: Write release notes
        shell: bash
        run: |
          set -euo pipefail
          cat > release-notes.md <<'EOF'
          Release ${{ steps.release.outputs.version }}

          Artifacts:
          - llmrelay-linux-amd64
          - llmrelay-linux-arm64
          - llmrelay-windows-amd64.exe
          - llmrelay-darwin-amd64
          - llmrelay-darwin-arm64
          - SHA256SUMS

          Verify checksums:

          ```sh
          sha256sum -c SHA256SUMS
          ```
          EOF

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release.outputs.version }}" dist/* \
            --title "llm-relay ${{ steps.release.outputs.version }}" \
            --notes-file release-notes.md \
            --verify-tag
